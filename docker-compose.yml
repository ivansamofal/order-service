version: '3.9'

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
#      - vendor:/var/www/html/vendor
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - product_net
      - microservices_net

  php:
    build:
      context: .
      dockerfile: php/Dockerfile
    volumes:
      - ./:/var/www/html
#      - vendor:/var/www/html/vendor
      - var:/var/www/html/var
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql://app:secret@postgres:5432/product_db?serverVersion=16&charset=utf8
      MESSENGER_TRANSPORT_DSN: amqp://guest:guest@rabbitmq:5672/%2f/messages
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - product_net
      - microservices_net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: product_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d product_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - product_net

  # Shared RabbitMQ — also used by order-service via microservices_net
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - product_net
      - microservices_net

  # Consumes OrderCreatedMessage from order-service and decrements stock
  product-consumer:
    build:
      context: .
      dockerfile: php/Dockerfile
    command: php bin/console messenger:consume orders_async --limit=100 -vv
    restart: unless-stopped
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql://app:secret@postgres:5432/product_db?serverVersion=16&charset=utf8
      MESSENGER_TRANSPORT_DSN: amqp://guest:guest@rabbitmq:5672/%2f/messages
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./:/var/www/html
      - var:/var/www/html/var
    networks:
      - product_net
      - microservices_net

volumes:
  postgres_data:
  rabbitmq_data:
#  vendor:
  var:

networks:
  product_net:
    driver: bridge

  # Shared network so order-service can reach rabbitmq
  microservices_net:
    driver: bridge
    name: microservices_net
